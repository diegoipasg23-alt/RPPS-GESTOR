<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPASG Screensaver</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #c8e6d5;
  }
  #sc {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  #bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .ov {
    position: absolute;
    inset: 0;
    background: rgba(10,50,30,0.10);
  }
  #cw {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 100%;
    pointer-events: none;
  }
  #ct {
    font-size: clamp(48px, 12vw, 120px);
    font-weight: 300;
    color: #1a5c3a;
    letter-spacing: 0.06em;
    text-shadow: 0 2px 30px rgba(255,255,255,.95), 0 0 80px rgba(255,255,255,.8);
    line-height: 1;
  }
  #cd {
    font-size: clamp(11px, 1.6vw, 20px);
    font-weight: 400;
    color: #2d7a50;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 12px;
    text-shadow: 0 1px 12px rgba(255,255,255,.95);
  }
  #cs {
    font-size: clamp(10px, 1.2vw, 16px);
    color: #4aaa72;
    letter-spacing: 0.18em;
    margin-top: 6px;
    font-weight: 300;
    text-shadow: 0 1px 8px rgba(255,255,255,.95);
  }
  .pt {
    position: absolute;
    border-radius: 50%;
    background: rgba(30,140,80,.18);
    animation: fu linear infinite;
    pointer-events: none;
  }
  @keyframes fu {
    0%   { transform: translateY(0) scale(1); opacity: .7; }
    100% { transform: translateY(-110vh) scale(.3); opacity: 0; }
  }
  #pr {
    position: absolute; top: 50%; left: 50%;
    width: 26vw; height: 26vw;
    max-width: 300px; max-height: 300px;
    border-radius: 50%;
    border: 1.5px solid rgba(30,140,80,.2);
    transform: translate(-50%,-50%);
    animation: pr 3s ease-out infinite;
    z-index: 5; pointer-events: none;
  }
  #pr2 {
    position: absolute; top: 50%; left: 50%;
    width: 20vw; height: 20vw;
    max-width: 230px; max-height: 230px;
    border-radius: 50%;
    border: 1px solid rgba(30,140,80,.12);
    transform: translate(-50%,-50%);
    animation: pr 3s ease-out infinite 1.5s;
    z-index: 5; pointer-events: none;
  }
  @keyframes pr {
    0%   { opacity: .8; transform: translate(-50%,-50%) scale(.9); }
    100% { opacity: 0;  transform: translate(-50%,-50%) scale(2.4); }
  }
  #tg {
    position: absolute;
    bottom: 3vh; right: 3vw;
    z-index: 20;
    text-align: right;
    color: #1a5c3a;
    font-size: clamp(10px, 1.1vw, 15px);
    opacity: .75;
    font-style: italic;
    text-shadow: 0 1px 8px rgba(255,255,255,.9);
    pointer-events: none;
  }
  #vb {
    position: absolute;
    bottom: 2vh; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex; gap: 2vw;
    color: #1a5c3a;
    font-size: clamp(7px, 0.8vw, 11px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: .5;
    font-weight: 500;
    text-shadow: 0 1px 6px rgba(255,255,255,.9);
    white-space: nowrap;
    pointer-events: none;
  }
</style>
</head>

<script>
  const D = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const M = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  function p(n) { return String(n).padStart(2,'0'); }
  function tick() {
    const n = new Date();
    document.getElementById('ct').textContent = p(n.getHours()) + ':' + p(n.getMinutes());
    document.getElementById('cs').textContent = ':' + p(n.getSeconds());
    document.getElementById('cd').textContent = D[n.getDay()] + ', ' + n.getDate() + ' de ' + M[n.getMonth()] + ' de ' + n.getFullYear();
  }
  tick();
  setInterval(tick, 1000);

  const sc = document.getElementById('sc');
  for (let i = 0; i < 18; i++) {
    const pt = document.createElement('div');
    pt.className = 'pt';
    const s = 5 + Math.random() * 20;
    pt.style.cssText = 'width:' + s + 'px;height:' + s + 'px;left:' + (Math.random()*100) + '%;bottom:' + (-s) + 'px;animation-duration:' + (8+Math.random()*16) + 's;animation-delay:' + (-Math.random()*16) + 's;opacity:' + (0.1+Math.random()*.3);
    sc.appendChild(pt);
  }
</script>
